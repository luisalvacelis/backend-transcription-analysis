services:
  - type: web
    name: backend-transcription-analysis
    runtime: docker
    plan: free
    dockerfilePath: ./Dockerfile
    autoDeploy: true
    healthCheckPath: /
    envVars:
      - key: API_TITLE
        value: Transcription And Analysis App API
      - key: API_VERSION
        value: 1.0.0
      - key: CORS_ORIGINS
        value: http://localhost:4200,http://localhost:3000
      - key: CORS_CREDENTIALS
        value: true
      - key: DEEPGRAM_TIMEOUT
        value: 1800.0
      - key: DEEPGRAM_MODEL
        value: nova-3
      - key: DEEPGRAM_LANGUAGE
        value: es
      - key: JWT_ALGORITHM
        value: HS256
      - key: JWT_EXPIRE_MINUTES
        value: 60
      - key: PWD_SCHEME
        value: bcrypt
      - key: WHISPERX_MODEL_SIZE
        value: medium
      - key: WHISPERX_DEVICE
        value: auto
      - key: WHISPERX_COMPUTE_TYPE
        value: float16
      - key: WHISPERX_BATCH_SIZE
        value: 8
      - key: WHISPERX_LANGUAGE
        value: es
      - key: DIARIZATION_MODEL
        value: pyannote/speaker-diarization-3.1
      - key: FFMPEG_TIMEOUT
        value: 300
      - key: FFMPEG_DEFAULT_BITRATE
        value: 128k
      - key: FFMPEG_DEFAULT_SAMPLE_RATE
        value: 16000
      - key: UPLOAD_DIR
        value: ./uploads
      - key: UPLOAD_CHUNK_SIZE
        value: 1048576
      - key: MAX_FILE_SIZE
        value: 524288000
      - key: OPENAI_MODEL
        value: gpt-4.1-mini
      - key: OPENAI_MAX_TOKENS
        value: 4000
      - key: OPENAI_TEMPERATURE
        value: 0.7
      - key: DATABASE_URL
        sync: false
      - key: DEEPGRAM_KEYS
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: HUGGINGFACE_TOKEN
        sync: false
      - key: OPENAI_API_KEY
        sync: false
